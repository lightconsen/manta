# Manta AI Assistant - Docker Compose
# Run Manta with persistent storage and configuration

version: "3.8"

services:
  manta:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manta
    restart: unless-stopped

    # Environment variables
    environment:
      # Required: LLM Provider Configuration
      - MANTA_BASE_URL=${MANTA_BASE_URL:-https://api.openai.com/v1}
      - MANTA_API_KEY=${MANTA_API_KEY:-}
      - MANTA_MODEL=${MANTA_MODEL:-gpt-4o-mini}

      # Optional: Anthropic API format
      - MANTA_IS_ANTHROPIC=${MANTA_IS_ANTHROPIC:-false}

      # Optional: Agent Configuration
      - MANTA_AGENT_NAME=${MANTA_AGENT_NAME:-Manta}
      - MANTA_SYSTEM_PROMPT=${MANTA_SYSTEM_PROMPT:-}

      # Optional: Feature Flags
      - MANTA_ENABLE_SKILLS=${MANTA_ENABLE_SKILLS:-true}
      - MANTA_ENABLE_CRON=${MANTA_ENABLE_CRON:-true}

      # Optional: Security Settings
      - MANTA_ALLOW_SHELL=${MANTA_ALLOW_SHELL:-true}
      - MANTA_SANDBOXED=${MANTA_SANDBOXED:-true}

    # Volumes for persistence
    volumes:
      # Data directory (conversations, memory, sessions)
      - manta-data:/app/data

      # Configuration directory
      - manta-config:/app/.config/manta

      # Optional: Mount custom skills
      - ./custom-skills:/app/custom-skills:ro

      # Optional: Mount working directory for file operations
      - ${PWD}/workspace:/app/workspace

    # Working directory for file operations
    working_dir: /app/workspace

    # Stdin for interactive mode
    stdin_open: true
    tty: true

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

    # Security
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

    # Network
    networks:
      - manta-network

    # Health check
    healthcheck:
      test: ["CMD", "manta", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Command override (default is interactive chat)
    # Uncomment to run as API server or with different mode
    # command: ["manta", "server", "--port", "8080"]

  # Optional: SQLite Web UI for database inspection
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: manta-sqlite-web
    restart: unless-stopped
    environment:
      - SQLITE_DATABASE=/data/manta.db
    volumes:
      - manta-data:/data:ro
    ports:
      - "8080:8080"
    networks:
      - manta-network
    profiles:
      - debug

volumes:
  manta-data:
    driver: local
  manta-config:
    driver: local

networks:
  manta-network:
    driver: bridge
