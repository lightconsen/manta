apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: manta

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: manta
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: manta-config
    behavior: merge
    literals:
      - MANTA_AGENT_NAME=Manta-K8s

images:
  - name: ghcr.io/anthropics/manta
    newTag: latest
