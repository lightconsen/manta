apiVersion: apps/v1
kind: Deployment
metadata:
  name: manta
  namespace: manta
  labels:
    app.kubernetes.io/name: manta
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: manta
  template:
    metadata:
      labels:
        app.kubernetes.io/name: manta
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: manta
          image: ghcr.io/anthropics/manta:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MANTA_CONFIG_DIR
              value: "/app/.config/manta"
            - name: MANTA_DATA_DIR
              value: "/app/data"
            - name: MANTA_BASE_URL
              value: "https://api.openai.com/v1"
            - name: MANTA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: manta-secrets
                  key: MANTA_API_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/.config/manta/config.yaml
              subPath: config.yaml
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/manta
                - --version
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/manta
                - --version
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: manta-data
        - name: config
          configMap:
            name: manta-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: manta-data
  namespace: manta
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
