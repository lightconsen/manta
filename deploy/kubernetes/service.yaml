apiVersion: v1
kind: Service
metadata:
  name: manta
  namespace: manta
  labels:
    app.kubernetes.io/name: manta
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: manta
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: manta
  namespace: manta
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - manta.example.com
      secretName: manta-tls
  rules:
    - host: manta.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: manta
                port:
                  number: 8080
