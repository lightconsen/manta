apiVersion: v1
kind: Secret
metadata:
  name: manta-secrets
  namespace: manta
type: Opaque
stringData:
  # Base64 encode your API key: echo -n 'your-api-key' | base64
  MANTA_API_KEY: ""
  # Optional: Add other secrets
  # MANTA_TELEGRAM_TOKEN: ""
  # MANTA_DISCORD_TOKEN: ""
  # MANTA_SLACK_TOKEN: ""
---
# Example of how to create secret from command line:
# kubectl create secret generic manta-secrets \
#   --from-literal=MANTA_API_KEY=your-api-key \
#   --namespace=manta