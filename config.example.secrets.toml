# Manta Configuration with Secrets Management Example
# This demonstrates the Advanced Secrets Management features

[server]
host = "127.0.0.1"
port = 8080

[logging]
level = "info"
format = "compact"

# Example 1: Raw API key (not recommended for production)
[services.anthropic_legacy]
endpoint = "https://api.anthropic.com"
api_key = "sk-ant-api03-..."
timeout_seconds = 60

# Example 2: Environment variable shorthand syntax (recommended)
[services.anthropic]
endpoint = "https://api.anthropic.com/v1"
api_key = "$ANTHROPIC_API_KEY"
timeout_seconds = 60

# Example 3: Explicit environment variable reference
[services.openai]
endpoint = "https://api.openai.com/v1"
api_key = { env = "OPENAI_API_KEY" }
timeout_seconds = 60

# Example 4: File-based secret (useful for Docker/Kubernetes)
[services.github]
endpoint = "https://api.github.com"
api_key = { file = "/run/secrets/github_token" }
timeout_seconds = 30

# Example 5: External command (for HashiCorp Vault, 1Password, etc.)
[services.custom_api]
endpoint = "https://api.custom.com"
api_key = { exec = "vault kv get -field=api_key secret/manta" }
timeout_seconds = 30

# Storage configuration
[storage]
storage_type = "sqlite"
connection = "~/.manta/memory.db"

# Example 6: Using secrets in other contexts
# The secrets system can be used anywhere SecretRef is supported
