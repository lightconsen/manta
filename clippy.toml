# Clippy configuration for Manta
# See: https://rust-lang.github.io/rust-clippy/master/index.html

# Lint groups to deny
deny = [
    "clippy::all",
    "clippy::pedantic",
    "clippy::correctness",
    "clippy::suspicious",
    "clippy::complexity",
    "clippy::perf",
    "clippy::style",
]

# Allowed lints (too strict for our use case)
allow = [
    # Allow these for now as they're too strict
    "clippy::module_name_repetitions",
    "clippy::must_use_candidate",
    "clippy::missing_errors_doc",
    "clippy::missing_panics_doc",
    # Allow async functions in traits (needed for our architecture)
    "clippy::future_not_send",
]

# Cognitive complexity threshold
cognitive-complexity-threshold = 25

# Too many arguments threshold
too-many-arguments-threshold = 7

# Too many lines threshold
too-many-lines-threshold = 100

# Large enum variant size (in bytes)
enum-variant-size-threshold = 200

# Large type threshold (in bytes)
type-complexity-threshold = 250

# Single char binding names threshold
single-char-binding-names-threshold = 5
